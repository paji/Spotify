<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証が必要です</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #24292e;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }
        button:hover {
            background-color: #2c974b;
        }
        .error-message {
            color: #cb2431;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>認証が必要です</h1>
        <p>このコンテンツにアクセスするにはパスワードが必要です。</p>
        
        <div id="login-form">
            <input type="password" id="password" placeholder="パスワードを入力してください">
            <button onclick="checkPassword()">アクセス</button>
            <p id="error-message" class="error-message">パスワードが正しくありません。</p>
        </div>
    </div>

    <script>
        function checkPassword() {
            // パスワードをここで設定（実際のパスワードに変更してください）
            const correctPassword = "your_secure_password";
            const enteredPassword = document.getElementById("password").value;
            
            if (enteredPassword === correctPassword) {
                // 正しいパスワードの場合、目的のページまたはコンテンツリストに移動
                // 以下のURLを実際のコンテンツページのURLに変更してください
                window.location.href = "./podcast/";
            } else {
                // 間違ったパスワードの場合、エラーメッセージを表示
                document.getElementById("error-message").style.display = "block";
            }
        }

        // Enterキーでも送信できるようにする
        document.getElementById("password").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>
</body>
</html>
